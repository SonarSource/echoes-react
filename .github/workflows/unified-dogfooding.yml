name: Unified Dogfooding scans
on:
  schedule:
    # Run the workflow every day at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  shadow-scans:
    runs-on: sonar-s
    name: Build and run shadow scans
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.2.24
      - uses: SonarSource/ci-github-actions/build-yarn@v1
        with:
          run-shadow-scans: true
        env:
          DESIGN_TOKEN_BRAND: Brand-A

      - name: Run IRIS
        uses: SonarSource/unified-dogfooding-actions/run-iris@v1
        with:
          primary_project_key: "SonarSource_echoes-react"
          primary_platform: "Next"
          shadow1_project_key: "SonarSource_echoes-react"
          shadow1_platform: "SQC-EU"
          shadow2_project_key: "SonarSource_echoes-react"
          shadow2_platform: "SQC-US"

  slack-notifications:
    runs-on: warp-custom-ubuntu-24-04 # Public GH runner is required, runners starting with sonar-* do not support this action
    if: failure()
    needs: [ shadow-scans ]
    permissions:
      id-token: write
    steps:
      - name: Vault Secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/kv/data/slack token | SLACK_TOKEN;

      - name: Slack Notification rtCamp
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58  # v2.4.0
        env:
          SLACK_TOKEN: >-
            ${{ fromJSON(steps.secrets.outputs.vault).SLACK_TOKEN }}
          SLACK_CHANNEL: ops-sonarcloud-webapp
          SLACK_TITLE: Shadow scans failed 🚨
          SLACK_USERNAME: BuildBot
          SLACK_COLOR: danger
          SLACK_MESSAGE: |
            Workflow failed in ${{ github.repository }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Branch: ${{ github.head_ref || github.ref_name }}
