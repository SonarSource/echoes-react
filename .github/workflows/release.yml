name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version'
        required: false

jobs:
  release:
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@v6
    with:
      publishToNpmJS: true
      skipJavascriptReleasabilityChecks: false
      useNpmTrustedPublisher: true
      githubEnvironment: release
    permissions:
      id-token: write
      contents: write

  slack-notifications:
    runs-on: warp-custom-ubuntu-24-04 # Public GH runner is required, runners starting with sonar-* do not support this action
    needs: [ release ]
    permissions:
      id-token: write
    steps:
      - name: Vault Secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/kv/data/slack token | SLACK_TOKEN;

      - name: Slack Notification rtCamp
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58  # v2.4.0
        env:
          SLACK_TOKEN: >-
            ${{ fromJSON(steps.secrets.outputs.vault).SLACK_TOKEN }}
          SLACK_CHANNEL: ops-sonarcloud-webapp
          SLACK_TITLE: "Release ${{ job.status == 'failure' && 'Failed 🚨' || 'Succeeded 🎉' }}"
          SLACK_USERNAME: BuildBot
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: |
            Workflow in ${{ github.repository }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Branch: ${{ github.head_ref || github.ref_name }}
            Released version: ${{ github.event.release.tag_name || inputs.release_version }}
